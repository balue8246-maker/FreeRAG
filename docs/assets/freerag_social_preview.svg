<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">FreeRAG social preview</title>
  <desc id="desc">A social preview image for FreeRAG, a macOS menu bar app that collects local context for coding agents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#f7efe6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="0" fill="url(#bg)"/>

  <g transform="translate(90 84)">
    <rect x="0" y="0" width="1100" height="472" rx="34" fill="#ffffff" opacity="0.86" filter="url(#shadow)"/>
    <rect x="42" y="44" width="120" height="120" rx="28" fill="#111827"/>
